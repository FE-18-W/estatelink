<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstateLink – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #ff9f43 100%);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.15);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            color: #2d3436;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
        }
        .logo-icon svg { width: 40px; height: 40px; stroke: #ff6b6b; fill: none; }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; color: #2d3436; }
        .tagline { color: #636e72; font-size: 0.9rem; margin-bottom: 2rem; }

        .input-group { margin-bottom: 1.2rem; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: #2d3436; }
        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 0.8rem;
            font-size: 0.95rem;
            color: #2d3436;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            background: white;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 3px rgba(255,107,107,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 0.8rem;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(238, 90, 36, 0.3);
            margin-top: 0.5rem;
        }
        .login-btn:hover { box-shadow: 0 8px 25px rgba(238, 90, 36, 0.5); transform: translateY(-2px); }

        .footer-text { margin-top: 1.5rem; font-size: 0.8rem; color: #636e72; }
        .footer-text a { color: #d63031; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </div>
        <h1>EstateLink</h1>
        <p class="tagline">Your estate. Connected.</p>

        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter your username" required>
            </div>
            <div class="input-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Enter your password" required>
            </div>
            {% if form.errors %}
            <p style="color: #d63031; font-size: 0.85rem; margin-bottom: 0.5rem;">Invalid username or password.</p>
            {% endif %}
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        <p class="footer-text">
            Not a member yet? <a href="{% url 'signup' %}">Create an account</a>
        </p>
    </div>
</body>
</html>
