{% extends 'core/base.html' %}
{% block title %}Garbage Schedule{% endblock %}
{% block content %}

<style>
  body {
    background: #0a0f1e !important;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  .page-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 1rem;
  }

  .page-title {
    font-size: 2rem;
    font-weight: 700;
    color: #2ed573;
    text-shadow: 0 0 15px rgba(46, 213, 115, 0.4);
    margin-bottom: 2rem;
    letter-spacing: 0.5px;
  }

  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }

  .schedule-card {
    background: rgba(18, 28, 46, 0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(46, 213, 115, 0.2);
    border-left: 4px solid #2ed573;
    border-radius: 1.2rem;
    padding: 1.5rem;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .schedule-card:hover {
    border-color: rgba(46, 213, 115, 0.6);
    box-shadow: 0 0 25px rgba(46, 213, 115, 0.2);
    transform: translateY(-4px);
  }

  .schedule-card::before {
    content: "";
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 8px;
    height: 8px;
    background: #2ed573;
    border-radius: 50%;
    box-shadow: 0 0 8px #2ed573;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.7; }
    50% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.7; }
  }

  .day-text {
    font-size: 1.4rem;
    font-weight: 700;
    color: #e8f5e9;
    margin-bottom: 0.5rem;
  }

  .time-text {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: #b0d4b1;
    font-size: 1rem;
  }

  .time-text svg {
    width: 18px;
    height: 18px;
    stroke: #2ed573;
  }

  .empty-state {
    color: #6b7b8f;
    background: rgba(18, 28, 46, 0.6);
    border-radius: 1rem;
    padding: 2rem;
    text-align: center;
    grid-column: 1 / -1;
  }
</style>

<div class="page-container">
  <h1 class="page-title">Garbage Collection Schedule</h1>

  <div class="schedule-grid">
    {% for schedule in schedules %}
      <div class="schedule-card">
        <div class="day-text">{{ schedule.collection_day }}</div>
        <div class="time-text">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          {{ schedule.time|time:"H:i" }}
        </div>
      </div>
    {% empty %}
      <div class="empty-state">
        No collection schedule posted yet.
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
