{% extends 'core/base.html' %}
{% block title %}Edit Estate{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 2rem auto; background: rgba(18,28,46,0.8); border-radius: 1.2rem; padding: 2rem;">
  <h2 style="color: #fbbf24;">Edit Estate</h2>
  <form method="post">
    {% csrf_token %}
    <input name="name" value="{{ estate.name }}" required style="width:100%; padding:0.6rem; margin:0.5rem 0; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:0.5rem; color:white;">
    <input name="location" value="{{ estate.location }}" style="width:100%; padding:0.6rem; margin:0.5rem 0; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:0.5rem; color:white;">
    <button type="submit" class="btn btn-green" style="margin-top:1rem;">Update Estate</button>
  </form>
</div>
{% endblock %}
